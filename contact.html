<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact du departement Informatique de l'EFREI.">
  <title>EFREI Informatique - Contact</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/script.js" defer></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="logo" href="index.html" aria-label="Accueil EFREI Informatique">
        <img src="media/images/logo-efrei.png" alt="Logo EFREI">
        <span>EFREI INFO</span>
      </a>
      <button class="burger" id="burgerBtn" aria-label="Ouvrir le menu" aria-expanded="false" aria-controls="mainNav">
        <span></span><span></span><span></span>
      </button>
      <nav id="mainNav" class="main-nav" aria-label="Navigation principale">
        <ul>
          <li><a href="index.html">Accueil</a></li>
          <li><a href="formations.html">Formations</a></li>
          <li><a href="equipe.html">Equipe</a></li>
          <li><a href="contact.html" class="active">Contact</a></li>
          <li><a href="apropos.html">A propos</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero hero-no-media reveal">
      <div class="hero-text">
        <h1>Contactez le departement Informatique</h1>
        <p>Une question sur les admissions, les parcours ou les projets ? Ecrivez-nous.</p>
      </div>
    </section>

    <section class="container reveal">
      <h2>Formulaire de contact</h2>
      <form id="contactForm" class="contact-form" novalidate>
        <div class="form-group">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" required minlength="2" autocomplete="name">
          <small class="error-message" id="nomError"></small>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email">
          <small class="error-message" id="emailError"></small>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required minlength="10"></textarea>
          <small class="error-message" id="messageError"></small>
        </div>

        <button type="submit" class="btn-cta">Envoyer le message</button>
        <p id="formFeedback" class="form-feedback" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 EFREI - Departement Informatique</p>
    </div>
  </footer>
</body>
</html>
